<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة إدارة الطلبات</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen p-4 md:p-6">
  <div id="root" dir="rtl"></div>
  <script type="text/babel">
    const { useState, useCallback, useMemo } = React;

    // Detect template type
    function detectTemplate(rows) {
      if (!rows || rows.length < 2) return 'UNKNOWN';
      const h = rows[0].map(c => String(c ?? '').trim().toLowerCase());
      if (h.includes('designation') && h.includes('prix') && h.includes('etat')) return 'CONVERTY';
      
      const firstCell = String(rows[0][0] ?? '').trim().toLowerCase();
      if (firstCell.startsWith('détails paiement') || firstCell.startsWith('details paiement')) return 'LOGISTA';
      
      return 'UNKNOWN';
    }

    // Parse Converty
    function parseConverty(rows) {
      const [header, ...data] = rows;
      const h = header.map(c => String(c ?? '').trim().toLowerCase());
      const get = (row, col) => row[h.indexOf(col)];

      const parsed = data
        .filter(row => {
          // CRITICAL FIX: Only include rows where Etat === 'Livré'
          const state = String(get(row, 'etat') ?? '').trim();
          return state === 'Livré';
        })
        .map(row => {
          return {
            id: crypto.randomUUID(),
            productName: String(get(row, 'designation') ?? '—').trim() || '—',
            totalSales: parseFloat(String(get(row, 'prix') ?? '0').replace(/,/g, '')) || 0,
            status: 'delivered'
          };
        });
      return { rows: parsed, autoFees: null };
    }

    // Parse Logista
    function parseLogista(rows) {
      // Dynamic section detection
      const findRow = (kw1, kw2) => rows.findIndex(r =>
        r.some(c => String(c ?? '').includes(kw1)) &&
        r.some(c => String(c ?? '').includes(kw2))
      );
      const findRowSingle = (kw) => rows.findIndex(r =>
        String(r[0] ?? '').trim().startsWith(kw)
      );

      const deliveredHeaderIdx = findRow('Code Barres', 'TTC (esp.)');
      if (deliveredHeaderIdx === -1) throw new Error('لم يتم العثور على جدول التسليم في ملف Logista');

      const deliveredEndIdx = findRowSingle('Total Livrés');
      const deliveredData = rows
        .slice(deliveredHeaderIdx + 1, deliveredEndIdx > -1 ? deliveredEndIdx : undefined)
        .filter(r => typeof r[0] === 'number');

      const returnHeaderIdx = findRow('Code Barres', 'Frais Ret.');
      const returnEndIdx = findRowSingle('Total Retours');
      const returnData = returnHeaderIdx > -1
        ? rows.slice(returnHeaderIdx + 1, returnEndIdx > -1 ? returnEndIdx : undefined).filter(r => typeof r[0] === 'number')
        : [];

      const parsedDelivered = deliveredData.map(row => {
        // TTC Fallback: Read index 8, fallback to 9
        let ttc = parseFloat(row[8]);
        if (isNaN(ttc) || ttc == null) ttc = parseFloat(row[9]) || 0;
        return {
          id: crypto.randomUUID(),
          productName: String(row[2] ?? '—').trim() || '—',
          totalSales: ttc,
          status: 'delivered'
        };
      });

      const parsedReturned = returnData.map(row => ({
        id: crypto.randomUUID(),
        productName: String(row[2] ?? '—').trim() || '—',
        totalSales: 0,
        status: 'returned'
      }));

      // Auto-Fee Computation
      let deliveryFee = 0;
      if (deliveredData.length > 0) {
        // Column 10 of delivered sub-table
        deliveryFee = parseFloat(deliveredData[0][10]) || 0;
      }

      let returnFee = 0;
      if (returnData.length > 0) {
        // Column 8 of returns sub-table
        returnFee = parseFloat(returnData[0][8]) || 0;
      }

      return { 
        rows: [...parsedDelivered, ...parsedReturned], 
        autoFees: { delivery: deliveryFee, return: returnFee } 
      };
    }

    function App() {
      // Three separate state arrays
      const [masterRows, setMasterRows] = useState([]);
      const [cakadoRows, setCakadoRows] = useState([]);
      const [balkisRows, setBalkisRows] = useState([]);
      
      const [error, setError] = useState(null);
      const [autoFeesInfo, setAutoFeesInfo] = useState(null);

      // Per-Brand Fee Structure
      const [cakadoFees, setCakadoFees] = useState({ delivery: 0, return: 0 });
      const [balkisFees, setBalkisFees] = useState({ delivery: 0, return: 0 });

      // Drag and drop mechanics
      const handleDragStart = (e, id) => {
        e.dataTransfer.setData('text/plain', id);
      };

      const handleDrop = (e, targetZone) => {
        e.preventDefault();
        const id = e.dataTransfer.getData('text/plain');
        if (!id) return;

        // Locate row across all three arrays
        let row = masterRows.find(r => r.id === id) || 
                  cakadoRows.find(r => r.id === id) || 
                  balkisRows.find(r => r.id === id);

        if (!row) return;

        // Remove from all three simultaneously
        setMasterRows(prev => prev.filter(r => r.id !== id));
        setCakadoRows(prev => prev.filter(r => r.id !== id));
        setBalkisRows(prev => prev.filter(r => r.id !== id));

        // Append to the target zone's array
        if (targetZone === 'master') {
          setMasterRows(prev => [...prev, row]);
        } else if (targetZone === 'cakado') {
          setCakadoRows(prev => [...prev, row]);
        } else if (targetZone === 'balkis') {
          setBalkisRows(prev => [...prev, row]);
        }
      };

      const handleDragOver = (e) => {
        e.preventDefault();
      };

      const handleFileUpload = useCallback((file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

            const template = detectTemplate(rawRows);
            let result;

            if (template === 'CONVERTY') result = parseConverty(rawRows);
            else if (template === 'LOGISTA') result = parseLogista(rawRows);
            else {
              setError('خطأ: تنسيق الملف غير معروف. يُقبل ملفات Converty أو Logista فقط.');
              return;
            }

            if (result.rows.length === 0) {
              setError('خطأ: الملف لا يحتوي على أي بيانات تخص التوصيل أو الإرجاع.');
              return;
            }

            setError(null);
            
            // Full State Reset: On every file upload, reset all state before loading new data
            setMasterRows(result.rows);
            setCakadoRows([]);
            setBalkisRows([]);
            
            if (result.autoFees) {
              setAutoFeesInfo(result.autoFees);
              setCakadoFees(result.autoFees);
              setBalkisFees(result.autoFees);
            } else {
              setAutoFeesInfo(null);
            }
          } catch (err) {
            setError('خطأ: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }, []);

      const onFileInputChange = useCallback((e) => {
        if (e.target.files && e.target.files.length > 0) {
          handleFileUpload(e.target.files[0]);
          e.target.value = '';
        }
      }, [handleFileUpload]);

      const onDropFile = useCallback((e) => {
        e.preventDefault();
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          handleFileUpload(e.dataTransfer.files[0]);
        }
      }, [handleFileUpload]);

      // Number Formatting
      const formatTND = (val) => val.toLocaleString('ar-TN', { style: 'currency', currency: 'TND', minimumFractionDigits: 3 });

      const calculateStats = (rows, fees) => {
        const delivered = rows.filter(r => r.status === 'delivered');
        const returned = rows.filter(r => r.status === 'returned');
        
        const totalSales = delivered.reduce((acc, row) => acc + row.totalSales, 0);
        const totalDeliveryFees = delivered.length * fees.delivery;
        const totalReturnFees = returned.length * fees.return;
        
        // Formula Correction: Final Total = Sum(Total Sales) - Delivery Fees - Return Fees
        const netRevenue = totalSales - totalDeliveryFees - totalReturnFees;

        return { totalSales, totalDeliveryFees, totalReturnFees, netRevenue, count: rows.length };
      };

      const cakadoStats = calculateStats(cakadoRows, cakadoFees);
      const balkisStats = calculateStats(balkisRows, balkisFees);

      const renderTable = (rows, title, zone) => (
        <div 
          className="bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col h-full min-h-[400px]"
          onDrop={(e) => handleDrop(e, zone)}
          onDragOver={handleDragOver}
        >
          <div className="bg-gray-100 p-3 border-b border-gray-200 rounded-t-lg font-bold text-gray-700 flex justify-between items-center">
            <span>{title}</span>
            <span className="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">{rows.length}</span>
          </div>
          <div className="flex-1 p-2 overflow-y-auto space-y-2">
            {rows.map(row => (
              <div
                key={row.id}
                draggable
                onDragStart={(e) => handleDragStart(e, row.id)}
                className="bg-gray-50 border border-gray-200 p-3 rounded shadow-sm cursor-grab active:cursor-grabbing hover:border-blue-300 transition-colors"
              >
                <div className="font-medium text-sm text-gray-800 mb-1">{row.productName}</div>
                <div className="flex justify-between items-center text-xs">
                  <span className={`px-2 py-0.5 rounded ${row.status === 'delivered' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                    {row.status === 'delivered' ? 'مُسلّم' : 'مسترجع'}
                  </span>
                  <span className="font-bold text-gray-900">{row.status === 'delivered' ? formatTND(row.totalSales) : '—'}</span>
                </div>
              </div>
            ))}
            {rows.length === 0 && (
              <div className="text-center text-gray-400 py-8 text-sm">
                اسحب الطلبات إلى هنا
              </div>
            )}
          </div>
        </div>
      );

      const renderFeeInputs = (fees, setFees) => (
        <div className="mt-4 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
          <h4 className="text-sm font-bold text-gray-700 mb-3">إعدادات الرسوم</h4>
          <div className="space-y-3">
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">رسوم التوصيل (TND)</label>
              <input
                type="number" step="0.001" min="0" dir="ltr"
                className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm"
                value={fees.delivery || 0}
                onChange={e => setFees(prev => ({ ...prev, delivery: parseFloat(e.target.value) || 0 }))}
              />
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">رسوم الإرجاع (TND)</label>
              <input
                type="number" step="0.001" min="0" dir="ltr"
                className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm"
                value={fees.return || 0}
                onChange={e => setFees(prev => ({ ...prev, return: parseFloat(e.target.value) || 0 }))}
              />
            </div>
          </div>
        </div>
      );

      const BrandSummaryCard = ({ title, stats }) => (
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex-1">
          <h3 className="text-lg font-bold text-gray-800 mb-3">{title}</h3>
          <div className="space-y-2 text-sm">
            <div className="flex justify-between text-gray-600">
              <span>إجمالي المبيعات</span>
              <span className="font-medium text-gray-900">{formatTND(stats.totalSales)}</span>
            </div>
            <div className="flex justify-between text-red-600">
              <span>إجمالي رسوم التوصيل</span>
              <span>- {formatTND(stats.totalDeliveryFees)}</span>
            </div>
            <div className="flex justify-between text-red-600">
              <span>إجمالي رسوم الإرجاع</span>
              <span>- {formatTND(stats.totalReturnFees)}</span>
            </div>
            <div className="pt-2 border-t border-gray-100 flex justify-between items-center mt-2">
              <span className="font-bold text-gray-800">صافي الإيرادات</span>
              <span className="font-bold text-lg text-blue-600">{formatTND(stats.netRevenue)}</span>
            </div>
          </div>
        </div>
      );

      return (
        <div className="max-w-7xl mx-auto flex flex-col gap-6">
          {/* 1. Page header */}
          <header className="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <h1 className="text-3xl font-bold text-gray-800">لوحة إدارة الطلبات</h1>
          </header>

          {/* 2. File upload zone */}
          <label 
            className="border-2 border-dashed border-blue-300 bg-blue-50 hover:bg-blue-100 transition-colors rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer text-center"
            onDrop={onDropFile}
            onDragOver={handleDragOver}
          >
            <svg className="w-10 h-10 text-blue-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <span className="font-semibold text-blue-800 text-lg">اضغط هنا أو اسحب ملف الطلبيات (.xlsx, .csv)</span>
            <input type="file" accept=".xlsx,.csv" className="hidden" onChange={onFileInputChange} />
          </label>

          {/* 3. Auto-fees notice */}
          {autoFeesInfo && (
            <div className="bg-green-50 text-green-800 border border-green-200 rounded-lg p-4 flex items-center gap-3">
              <svg className="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              <p>تم استخراج الرسوم التلقائية من ملف Logista: {formatTND(autoFeesInfo.delivery)} للتوصيل و {formatTND(autoFeesInfo.return)} للإرجاع.</p>
            </div>
          )}

          {/* 4. Error message area */}
          {error && (
            <div className="bg-red-50 text-red-700 border border-red-200 rounded-lg p-4 flex items-center gap-3">
              <svg className="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              <p>{error}</p>
            </div>
          )}

          {(masterRows.length > 0 || cakadoRows.length > 0 || balkisRows.length > 0) && (
            <>
              {/* 5. Summary Dashboard */}
              <div className="flex flex-col md:flex-row gap-4">
                <BrandSummaryCard title="كاكادو (CAKADO)" stats={cakadoStats} />
                <BrandSummaryCard title="بلقيس (Balkis)" stats={balkisStats} />
              </div>

              {/* 6. Three-column responsive grid */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div>
                  {renderTable(masterRows, 'غير مصنفة', 'master')}
                </div>
                <div>
                  {renderTable(cakadoRows, 'كاكادو', 'cakado')}
                  {renderFeeInputs(cakadoFees, setCakadoFees)}
                </div>
                <div>
                  {renderTable(balkisRows, 'بلقيس', 'balkis')}
                  {renderFeeInputs(balkisFees, setBalkisFees)}
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
