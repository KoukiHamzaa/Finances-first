<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة إدارة الطلبات</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    /* Custom scrollbar for better mobile UX */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen pb-24">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback, useEffect } = React;

    function detectTemplate(rows) {
      if (!rows || rows.length < 2) return 'UNKNOWN';
      const h = rows[0].map(c => String(c ?? '').trim().toLowerCase());
      if (h.includes('designation') && h.includes('prix') && h.includes('etat')) return 'CONVERTY';
      if (String(rows[0][0] ?? '').trim().toLowerCase().startsWith('détails paiement') ||
          String(rows[0][0] ?? '').trim().toLowerCase().startsWith('details paiement')) return 'LOGISTA';
      return 'UNKNOWN';
    }

    function parseConverty(rows, deliveryCompanyName = 'Converty') {
      const [header, ...data] = rows;
      const h = header.map(c => String(c ?? '').trim().toLowerCase());
      const get = (row, col) => row[h.indexOf(col)];

      const parsed = data
        .filter(row => {
          const state = String(get(row, 'etat') ?? '').trim().toLowerCase();
          return state === 'livré' || state === 'retour';
        })
        .map(row => {
          const state = String(get(row, 'etat') ?? '').trim().toLowerCase();
          return {
            id: crypto.randomUUID(),
            productName: String(get(row, 'designation') ?? '—').trim() || '—',
            deliveryCompany: deliveryCompanyName,
            totalSales: state === 'livré' ? parseFloat(String(get(row, 'prix') ?? '0').replace(/,/g, '')) || 0 : 0,
            status: state === 'livré' ? 'delivered' : 'returned',
            zone: 'master'
          };
        });
      return { rows: parsed, autoFees: null };
    }

    function parseLogista(rows) {
      const findRow = (kw1, kw2) => rows.findIndex(r =>
        r.some(c => String(c ?? '').includes(kw1)) &&
        r.some(c => String(c ?? '').includes(kw2))
      );
      const findRowSingle = (kw) => rows.findIndex(r =>
        String(r[0] ?? '').trim().startsWith(kw)
      );

      const senderRow = rows.find(r => String(r[0] ?? '').includes('Expéditeur'));
      const deliveryCompanyName = senderRow ? String(senderRow[2] ?? 'Logista').trim() : 'Logista';

      const deliveredHeaderIdx = findRow('Code Barres', 'TTC (esp.)');
      if (deliveredHeaderIdx === -1) throw new Error('لم يتم العثور على جدول التسليم في ملف Logista');

      const deliveredEndIdx = findRowSingle('Total Livrés');
      const deliveredData = rows
        .slice(deliveredHeaderIdx + 1, deliveredEndIdx > -1 ? deliveredEndIdx : undefined)
        .filter(r => typeof r[0] === 'number');

      const returnHeaderIdx = findRow('Code Barres', 'Frais Ret.');
      const returnEndIdx = findRowSingle('Total Retours');
      const returnData = returnHeaderIdx > -1
        ? rows.slice(returnHeaderIdx + 1, returnEndIdx > -1 ? returnEndIdx : undefined).filter(r => typeof r[0] === 'number')
        : [];

      const parsedDelivered = deliveredData.map(row => ({
        id: crypto.randomUUID(),
        productName: String(row[2] ?? '—').trim() || '—',
        deliveryCompany: deliveryCompanyName,
        totalSales: parseFloat(row[8] ?? row[9] ?? 0) || 0,
        status: 'delivered',
        zone: 'master'
      }));

      const parsedReturned = returnData.map(row => ({
        id: crypto.randomUUID(),
        productName: String(row[2] ?? '—').trim() || '—',
        deliveryCompany: deliveryCompanyName,
        totalSales: 0,
        status: 'returned',
        zone: 'master'
      }));

      return { rows: [...parsedDelivered, ...parsedReturned], autoFees: null };
    }

    // Component: Summary Dashboard
    function Dashboard({ orders, fees }) {
      const calculateBrandStats = (zone) => {
        const brandOrders = orders.filter(o => o.zone === zone);
        const companies = [...new Set(brandOrders.map(o => o.deliveryCompany))];
        
        let totalSales = 0;
        let totalDeliveryFees = 0;
        let totalReturnFees = 0;
        
        const companyStats = companies.map(company => {
          const compOrders = brandOrders.filter(o => o.deliveryCompany === company);
          const deliveredCount = compOrders.filter(o => o.status === 'delivered').length;
          const returnedCount = compOrders.filter(o => o.status === 'returned').length;
          const sales = compOrders.reduce((s, o) => s + o.totalSales, 0);
          
          const feeConfig = fees[company] || { delivery: 0, return: 0 };
          const dFee = deliveredCount * feeConfig.delivery;
          const rFee = returnedCount * feeConfig.return;
          
          totalSales += sales;
          totalDeliveryFees += dFee;
          totalReturnFees += rFee;
          
          return { company, deliveredCount, returnedCount, sales, dFee, rFee };
        });
        
        const netRevenue = totalSales - totalDeliveryFees - totalReturnFees;
        return { totalSales, totalDeliveryFees, totalReturnFees, netRevenue, companyStats, count: brandOrders.length };
      };

      const cakado = calculateBrandStats('cakado');
      const balkis = calculateBrandStats('balkis');

      const formatTND = (val) => val.toLocaleString('ar-TN', { style: 'currency', currency: 'TND', minimumFractionDigits: 3 });

      const BrandCard = ({ title, stats }) => (
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex-1">
          <h3 className="text-xl font-bold text-gray-800 mb-4">{title} <span className="text-sm font-normal text-gray-500">({stats.count} طلب)</span></h3>
          <div className="space-y-3">
            <div className="flex justify-between text-gray-600">
              <span>إجمالي المبيعات</span>
              <span className="font-medium text-gray-900">{formatTND(stats.totalSales)}</span>
            </div>
            <div className="flex justify-between text-red-600">
              <span>إجمالي رسوم التوصيل</span>
              <span>- {formatTND(stats.totalDeliveryFees)}</span>
            </div>
            <div className="flex justify-between text-red-600">
              <span>إجمالي رسوم الإرجاع</span>
              <span>- {formatTND(stats.totalReturnFees)}</span>
            </div>
            <div className="pt-3 border-t border-gray-100 flex justify-between items-center">
              <span className="font-bold text-gray-800 text-lg">صافي الإيرادات</span>
              <span className="font-bold text-xl text-blue-600">{formatTND(stats.netRevenue)}</span>
            </div>
          </div>
          
          {stats.companyStats.length > 0 && (
            <div className="mt-4 pt-4 border-t border-gray-100">
              <h4 className="text-sm font-semibold text-gray-700 mb-2">تفاصيل الشركات</h4>
              <div className="space-y-3">
                {stats.companyStats.map(c => (
                  <div key={c.company} className="text-xs bg-gray-50 p-3 rounded border border-gray-100">
                    <div className="flex justify-between items-center mb-2 pb-2 border-b border-gray-200">
                      <span className="font-bold text-gray-800 text-sm">{c.company}</span>
                      <div className="text-left text-gray-600 flex gap-3 font-medium">
                        <span><b className="text-blue-600">{c.deliveredCount}</b> تسليم</span>
                        <span><b className="text-purple-600">{c.returnedCount}</b> إرجاع</span>
                      </div>
                    </div>
                    <div className="flex justify-between text-gray-500 mb-1">
                      <span>رسوم التوصيل:</span>
                      <span className="text-red-500 font-medium">- {formatTND(c.dFee)}</span>
                    </div>
                    <div className="flex justify-between text-gray-500">
                      <span>رسوم الإرجاع:</span>
                      <span className="text-red-500 font-medium">- {formatTND(c.rFee)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );

      return (
        <div className="flex flex-col lg:flex-row gap-4 mb-6">
          <BrandCard title="كاكادو (CAKADO)" stats={cakado} />
          <BrandCard title="بلقيس (Balkis)" stats={balkis} />
        </div>
      );
    }

    function App() {
      const [orders, setOrders] = useState([]);
      const [fees, setFees] = useState({});
      const [error, setError] = useState(null);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [activeTab, setActiveTab] = useState('master'); // master, cakado, balkis
      
      const [searchQuery, setSearchQuery] = useState('');
      const [filterCompany, setFilterCompany] = useState('all');
      const [sortOrder, setSortOrder] = useState('default');
      
      const [customCompanies, setCustomCompanies] = useState(['First Delivery', 'Big Boss Delivery']);
      const [newCompanyName, setNewCompanyName] = useState('');
      const [selectedMoveCompany, setSelectedMoveCompany] = useState('');
      
      useEffect(() => {
        setFees(prev => {
          let updated = false;
          const newFees = { ...prev };
          customCompanies.forEach(c => {
            if (!newFees[c]) {
              newFees[c] = { delivery: 0, return: 0 };
              updated = true;
            }
          });
          return updated ? newFees : prev;
        });
      }, [customCompanies]);

      const handleAddCompany = () => {
        const name = newCompanyName.trim();
        if (name && !customCompanies.includes(name)) {
          setCustomCompanies(prev => [...prev, name]);
        }
        setNewCompanyName('');
      };

      const handleFileUpload = useCallback((file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

            const template = detectTemplate(rawRows);
            let result;

            if (template === 'CONVERTY') result = parseConverty(rawRows);
            else if (template === 'LOGISTA') result = parseLogista(rawRows);
            else {
              setError('خطأ: تنسيق الملف غير معروف. يُقبل ملفات Converty أو Logista فقط.');
              return;
            }

            if (result.rows.length === 0) {
              setError('خطأ: الملف لا يحتوي على أي بيانات تخص التوصيل أو الإرجاع.');
              return;
            }

            setError(null);
            setOrders(prev => [...prev, ...result.rows]);
            
            // Initialize fees for new companies
            const newCompanies = [...new Set(result.rows.map(r => r.deliveryCompany))];
            setCustomCompanies(prev => {
              const merged = new Set([...prev, ...newCompanies]);
              return Array.from(merged);
            });
            setFees(prev => {
              const newFees = { ...prev };
              newCompanies.forEach(c => {
                if (!newFees[c]) newFees[c] = { delivery: 0, return: 0 };
              });
              return newFees;
            });
            
          } catch (err) {
            setError('خطأ: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }, []);

      const onFileInputChange = useCallback((e) => {
        if (e.target.files && e.target.files.length > 0) {
          handleFileUpload(e.target.files[0]);
          e.target.value = '';
        }
      }, [handleFileUpload]);

      const allCompanies = useMemo(() => {
        return [...new Set([...customCompanies, ...orders.map(o => o.deliveryCompany)])];
      }, [customCompanies, orders]);

      const filteredOrders = useMemo(() => {
        let res = orders.filter(o => o.zone === activeTab);
        if (searchQuery) {
          res = res.filter(o => o.productName.toLowerCase().includes(searchQuery.toLowerCase()));
        }
        if (filterCompany !== 'all') {
          res = res.filter(o => o.deliveryCompany === filterCompany);
        }
        if (sortOrder === 'asc') {
          res = res.sort((a, b) => a.productName.localeCompare(b.productName, 'ar', { sensitivity: 'base' }));
        } else if (sortOrder === 'desc') {
          res = res.sort((a, b) => b.productName.localeCompare(a.productName, 'ar', { sensitivity: 'base' }));
        }
        return res;
      }, [orders, activeTab, searchQuery, filterCompany, sortOrder]);

      const handleSelectAll = () => {
        if (selectedIds.size === filteredOrders.length && filteredOrders.length > 0) {
          setSelectedIds(new Set());
        } else {
          setSelectedIds(new Set(filteredOrders.map(o => o.id)));
        }
      };

      const handleSelectRow = (id) => {
        const next = new Set(selectedIds);
        if (next.has(id)) next.delete(id);
        else next.add(id);
        setSelectedIds(next);
      };

      const moveSelected = (targetZone) => {
        setOrders(prev => prev.map(o => {
          if (selectedIds.has(o.id)) {
            return {
              ...o,
              zone: targetZone,
              deliveryCompany: selectedMoveCompany || o.deliveryCompany
            };
          }
          return o;
        }));
        setSelectedIds(new Set());
      };

      const updateFee = (company, type, value) => {
        setFees(prev => ({
          ...prev,
          [company]: {
            ...prev[company],
            [type]: parseFloat(value) || 0
          }
        }));
      };

      return (
        <div className="max-w-7xl mx-auto p-4 md:p-6 flex flex-col gap-6">
          <header className="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <div>
              <h1 className="text-2xl md:text-3xl font-bold text-gray-800">لوحة إدارة الطلبات</h1>
              <p className="text-gray-500 mt-1 text-sm">أداة تسوية الحسابات مع شركات التوصيل</p>
            </div>
            
            <label className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-lg cursor-pointer font-medium transition-colors text-center inline-flex justify-center items-center gap-2 shadow-sm">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
              رفع ملف طلبيات (Excel / CSV)
              <input type="file" accept=".xlsx,.csv" className="hidden" onChange={onFileInputChange} />
            </label>
          </header>

          {error && (
            <div className="bg-red-50 text-red-700 border border-red-200 rounded-lg p-4 flex items-center gap-3">
              <svg className="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              <p>{error}</p>
            </div>
          )}

          {orders.length === 0 && !error && (
             <div className="border-2 border-dashed border-gray-300 rounded-xl p-12 flex flex-col items-center justify-center bg-white text-center">
              <svg className="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
              <p className="text-xl font-medium text-gray-700">لا توجد بيانات حالياً</p>
              <p className="text-gray-500 mt-2 max-w-sm">قم برفع ملفات طلبيات (Converty أو Logista) للبدء في تقسيمها وحساب الإيرادات تلقائياً.</p>
            </div>
          )}

          {orders.length > 0 && (
            <>
              <Dashboard orders={orders} fees={fees} />

              <section className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 md:p-6">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                  <h2 className="text-lg font-bold text-gray-800">رسوم شركات التوصيل</h2>
                  <div className="flex gap-2 w-full sm:w-auto">
                    <input 
                      type="text" 
                      placeholder="اسم شركة جديدة..."
                      className="flex-1 sm:flex-none border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500"
                      value={newCompanyName}
                      onChange={e => setNewCompanyName(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && handleAddCompany()}
                    />
                    <button 
                      onClick={handleAddCompany}
                      className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                    >
                      إضافة
                    </button>
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {allCompanies.map(company => (
                    <div key={company} className="border border-gray-100 bg-gray-50 p-4 rounded-lg relative group">
                      <h3 className="font-semibold text-gray-800 mb-3">{company}</h3>
                      <div className="space-y-3">
                        <div>
                          <label className="block text-xs font-medium text-gray-600 mb-1">تسعيرة الطلب المُسلَّم (TND)</label>
                          <input
                            type="number" min="0" step="0.001" dir="ltr"
                            className="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 bg-white"
                            value={fees[company]?.delivery || 0}
                            onChange={(e) => updateFee(company, 'delivery', e.target.value)}
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-gray-600 mb-1">تسعيرة الطلب المسترجع (TND)</label>
                          <input
                            type="number" min="0" step="0.001" dir="ltr"
                            className="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 bg-white"
                            value={fees[company]?.return || 0}
                            onChange={(e) => updateFee(company, 'return', e.target.value)}
                          />
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              <section className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden relative">
                {/* Tabs */}
                <div className="flex border-b border-gray-200 bg-gray-50 overflow-x-auto">
                  <button 
                    onClick={() => { setActiveTab('master'); setSelectedIds(new Set()); }}
                    className={`flex-none w-1/3 min-w-[120px] py-4 px-2 text-sm font-bold text-center border-b-2 transition-colors ${activeTab === 'master' ? 'border-blue-600 text-blue-700 bg-white' : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-100'}`}
                  >
                    غير مصنفة ({orders.filter(o => o.zone === 'master').length})
                  </button>
                  <button 
                    onClick={() => { setActiveTab('cakado'); setSelectedIds(new Set()); }}
                    className={`flex-none w-1/3 min-w-[120px] py-4 px-2 text-sm font-bold text-center border-b-2 transition-colors ${activeTab === 'cakado' ? 'border-blue-600 text-blue-700 bg-white' : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-100'}`}
                  >
                    كاكادو ({orders.filter(o => o.zone === 'cakado').length})
                  </button>
                  <button 
                    onClick={() => { setActiveTab('balkis'); setSelectedIds(new Set()); }}
                    className={`flex-none w-1/3 min-w-[120px] py-4 px-2 text-sm font-bold text-center border-b-2 transition-colors ${activeTab === 'balkis' ? 'border-blue-600 text-blue-700 bg-white' : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-100'}`}
                  >
                    بلقيس ({orders.filter(o => o.zone === 'balkis').length})
                  </button>
                </div>

                {/* Filters */}
                <div className="p-4 border-b border-gray-200 flex flex-col sm:flex-row gap-3 bg-white flex-wrap">
                  <div className="relative flex-1 min-w-[200px]">
                    <svg className="w-5 h-5 absolute right-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input
                      type="text"
                      placeholder="ابحث عن منتج..."
                      className="w-full border border-gray-300 rounded-lg pr-10 pl-4 py-2 text-sm focus:ring-blue-500 focus:border-blue-500"
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                    />
                  </div>
                  <select
                    className="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 bg-white min-w-[140px]"
                    value={filterCompany}
                    onChange={e => setFilterCompany(e.target.value)}
                  >
                    <option value="all">تصفية: جميع الشركات</option>
                    {allCompanies.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <select
                    className="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 bg-white min-w-[140px]"
                    value={sortOrder}
                    onChange={e => setSortOrder(e.target.value)}
                  >
                    <option value="default">الترتيب: الافتراضي</option>
                    <option value="asc">الاسم (أ - ي)</option>
                    <option value="desc">الاسم (ي - أ)</option>
                  </select>
                </div>

                {/* List/Table */}
                <div className="overflow-x-auto">
                  <table className="w-full text-sm text-right">
                    <thead className="bg-gray-50 border-b border-gray-200 text-gray-600 hidden md:table-header-group">
                      <tr>
                        <th className="px-4 py-3 w-12 text-center">
                          <input 
                            type="checkbox" 
                            className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer"
                            checked={filteredOrders.length > 0 && selectedIds.size === filteredOrders.length}
                            onChange={handleSelectAll}
                          />
                        </th>
                        <th className="px-4 py-3 font-medium">المنتج</th>
                        <th className="px-4 py-3 font-medium">الشركة</th>
                        <th className="px-4 py-3 font-medium">الحالة</th>
                        <th className="px-4 py-3 font-medium">المبلغ</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {/* Mobile Select All */}
                      <tr className="md:hidden bg-gray-50 border-b border-gray-200">
                        <td colSpan="5" className="px-4 py-3">
                          <label className="flex items-center gap-3 text-sm font-medium text-gray-700 cursor-pointer">
                            <input 
                              type="checkbox" 
                              className="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                              checked={filteredOrders.length > 0 && selectedIds.size === filteredOrders.length}
                              onChange={handleSelectAll}
                            />
                            تحديد كل الطلبات المعروضة
                          </label>
                        </td>
                      </tr>
                      {filteredOrders.length === 0 ? (
                        <tr>
                          <td colSpan="5" className="px-4 py-8 text-center text-gray-500">
                            لا توجد طلبات تطابق معايير البحث
                          </td>
                        </tr>
                      ) : (
                        filteredOrders.map(row => (
                          <tr 
                            key={row.id} 
                            onClick={() => handleSelectRow(row.id)}
                            className={`hover:bg-blue-50 cursor-pointer transition-colors flex flex-col md:table-row py-4 md:py-0 px-4 md:px-0 ${selectedIds.has(row.id) ? 'bg-blue-50/60' : 'bg-white'}`}
                          >
                            <td className="md:px-4 md:py-3 md:w-12 text-center hidden md:table-cell align-middle">
                              <input 
                                type="checkbox" 
                                className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 pointer-events-none"
                                checked={selectedIds.has(row.id)}
                                readOnly
                              />
                            </td>
                            
                            {/* Mobile View rendering */}
                            <td className="md:hidden flex items-start gap-3 w-full">
                              <input 
                                type="checkbox" 
                                className="w-5 h-5 mt-0.5 text-blue-600 rounded border-gray-300 focus:ring-blue-500 pointer-events-none flex-shrink-0"
                                checked={selectedIds.has(row.id)}
                                readOnly
                              />
                              <div className="flex-1 min-w-0">
                                <div className="font-semibold text-gray-900 leading-tight mb-2">{row.productName}</div>
                                <div className="text-xs flex flex-wrap gap-2 items-center">
                                  <span className="bg-gray-100 text-gray-700 px-2 py-1 rounded font-medium">{row.deliveryCompany}</span>
                                  <span className={`px-2 py-1 rounded font-medium ${row.status === 'delivered' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                                    {row.status === 'delivered' ? 'مُسلّم' : 'مسترجع'}
                                  </span>
                                  <span className="mr-auto font-bold text-gray-900 text-sm">
                                    {row.status === 'delivered' ? row.totalSales.toFixed(3) + ' TND' : '—'}
                                  </span>
                                </div>
                              </div>
                            </td>
                            
                            {/* Desktop View rendering */}
                            <td className="px-4 py-3 hidden md:table-cell max-w-[250px] truncate text-gray-900 font-medium" title={row.productName}>{row.productName}</td>
                            <td className="px-4 py-3 hidden md:table-cell whitespace-nowrap text-gray-600">{row.deliveryCompany}</td>
                            <td className="px-4 py-3 hidden md:table-cell whitespace-nowrap">
                              <span className={`inline-flex items-center px-2 py-1 rounded-md text-xs font-semibold ${row.status === 'delivered' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                                {row.status === 'delivered' ? 'مُسلّم' : 'مسترجع'}
                              </span>
                            </td>
                            <td className="px-4 py-3 hidden md:table-cell whitespace-nowrap font-bold text-gray-900">
                              {row.status === 'delivered' ? row.totalSales.toFixed(3) + ' TND' : '—'}
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </section>
            </>
          )}

          {/* Floating Action Bar */}
          {selectedIds.size > 0 && (
            <div className="fixed bottom-0 left-0 right-0 p-4 z-50 pointer-events-none">
              <div className="max-w-5xl mx-auto bg-gray-900 text-white rounded-xl shadow-2xl p-4 flex flex-col md:flex-row items-center justify-between gap-4 pointer-events-auto shadow-blue-900/20">
                <div className="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
                  <div className="flex items-center gap-2">
                    <span className="font-bold text-lg bg-blue-600 text-white px-3 py-1 rounded-lg shadow-sm">{selectedIds.size}</span>
                    <span className="text-gray-200 font-medium text-sm">محدد</span>
                  </div>
                  <button onClick={() => setSelectedIds(new Set())} className="text-gray-400 hover:text-white text-sm font-medium px-2 py-1 rounded hover:bg-gray-800 transition-colors">إلغاء</button>
                </div>
                
                <div className="flex items-center gap-2 w-full md:w-auto border-t md:border-t-0 md:border-r border-gray-700 pt-3 md:pt-0 md:pr-4">
                  <span className="text-sm font-medium text-gray-300 hidden sm:inline">تعيين كـ:</span>
                  <select 
                    className="flex-1 sm:flex-none bg-gray-800 border border-gray-700 text-white rounded-lg px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500"
                    value={selectedMoveCompany}
                    onChange={e => setSelectedMoveCompany(e.target.value)}
                  >
                    <option value="">(نفس الشركة الحالية)</option>
                    {allCompanies.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>

                <div className="flex gap-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0 hide-scrollbar mt-1 md:mt-0">
                  {activeTab !== 'master' && (
                    <button onClick={() => moveSelected('master')} className="flex-1 md:flex-none whitespace-nowrap px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg text-sm font-bold transition-colors">
                      إلى غير مصنفة
                    </button>
                  )}
                  {activeTab !== 'cakado' && (
                    <button onClick={() => moveSelected('cakado')} className="flex-1 md:flex-none whitespace-nowrap px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-bold transition-colors">
                      نقل إلى كاكادو
                    </button>
                  )}
                  {activeTab !== 'balkis' && (
                    <button onClick={() => moveSelected('balkis')} className="flex-1 md:flex-none whitespace-nowrap px-4 py-2 bg-purple-600 hover:bg-purple-500 text-white rounded-lg text-sm font-bold transition-colors">
                      نقل إلى بلقيس
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
