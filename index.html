<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة إدارة الطلبات</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen pb-24">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback, useEffect } = React;

    // ============================================================================
    // TEMPLATE DETECTION & PARSERS
    // ============================================================================

    function detectTemplate(rows) {
      if (!rows || rows.length < 2) return 'UNKNOWN';
      const h = rows[0].map(c => String(c ?? '').trim().toLowerCase());
      
      // CONVERTY fingerprint: flat table with 'designation', 'prix', 'etat'
      if (h.includes('designation') && h.includes('prix') && h.includes('etat')) {
        return 'CONVERTY';
      }
      
      // LOGISTA fingerprint: first cell starts with 'détails paiement'
      if (String(rows[0][0] ?? '').trim().toLowerCase().startsWith('détails paiement') ||
          String(rows[0][0] ?? '').trim().toLowerCase().startsWith('details paiement')) {
        return 'LOGISTA';
      }
      
      return 'UNKNOWN';
    }

    function parseConverty(rows, deliveryCompanyName = 'Converty') {
      const [header, ...data] = rows;
      const h = header.map(c => String(c ?? '').trim().toLowerCase());
      const get = (row, col) => row[h.indexOf(col)];

      // CRITICAL FIX: Only include rows where etat === 'Livré' (delivered only)
      const parsed = data
        .filter(row => {
          const state = String(get(row, 'etat') ?? '').trim().toLowerCase();
          return state === 'livré'; // <-- ONLY delivered, NOT returned
        })
        .map(row => ({
          id: crypto.randomUUID(),
          productName: String(get(row, 'designation') ?? '—').trim() || '—',
          deliveryCompany: deliveryCompanyName,
          totalSales: parseFloat(String(get(row, 'prix') ?? '0').replace(/,/g, '')) || 0,
          status: 'delivered',
          zone: 'master'
        }));

      return { rows: parsed, autoFees: null };
    }

    function parseLogista(rows) {
      // Helper: find row containing both keywords
      const findRow = (kw1, kw2) => rows.findIndex(r =>
        r.some(c => String(c ?? '').includes(kw1)) &&
        r.some(c => String(c ?? '').includes(kw2))
      );
      
      // Helper: find row where first cell starts with keyword
      const findRowSingle = (kw) => rows.findIndex(r =>
        String(r[0] ?? '').trim().startsWith(kw)
      );

      // Extract sender name from metadata
      const senderRow = rows.find(r => String(r[0] ?? '').includes('Expéditeur'));
      const deliveryCompanyName = senderRow ? String(senderRow[2] ?? 'Logista').trim() : 'Logista';

      // ===== DELIVERED SUB-TABLE =====
      const deliveredHeaderIdx = findRow('Code Barres', 'TTC (esp.)');
      if (deliveredHeaderIdx === -1) {
        throw new Error('لم يتم العثور على جدول التسليم في ملف Logista');
      }

      const deliveredEndIdx = findRowSingle('Total Livrés');
      const deliveredData = rows
        .slice(deliveredHeaderIdx + 1, deliveredEndIdx > -1 ? deliveredEndIdx : undefined)
        .filter(r => typeof r[0] === 'number');

      // ===== RETURNS SUB-TABLE =====
      const returnHeaderIdx = findRow('Code Barres', 'Frais Ret.');
      const returnEndIdx = findRowSingle('Total Retours');
      const returnData = returnHeaderIdx > -1
        ? rows.slice(returnHeaderIdx + 1, returnEndIdx > -1 ? returnEndIdx : undefined)
            .filter(r => typeof r[0] === 'number')
        : [];

      // ===== AUTO-FEE COMPUTATION =====
      // Delivery fees from column 10 of delivered sub-table
      const autoDeliveryFees = deliveredData.reduce((s, r) => s + (parseFloat(r[10]) || 0), 0);
      // Return fees from column 8 of returns sub-table
      const autoReturnFees = returnData.reduce((s, r) => s + (parseFloat(r[8]) || 0), 0);

      // ===== MAP ROWS =====
      const parsedDelivered = deliveredData.map(row => ({
        id: crypto.randomUUID(),
        productName: String(row[2] ?? '—').trim() || '—',
        deliveryCompany: deliveryCompanyName,
        // CRITICAL FIX: Fallback from TTC (esp.) at index 8 to TTC (chq.) at index 9
        totalSales: parseFloat(row[8] ?? row[9] ?? 0) || 0,
        status: 'delivered',
        zone: 'master'
      }));

      const parsedReturned = returnData.map(row => ({
        id: crypto.randomUUID(),
        productName: String(row[2] ?? '—').trim() || '—',
        deliveryCompany: deliveryCompanyName,
        totalSales: 0,
        status: 'returned',
        zone: 'master'
      }));

      return {
        rows: [...parsedDelivered, ...parsedReturned],
        autoFees: { delivery: autoDeliveryFees, return: autoReturnFees }
      };
    }

    // ============================================================================
    // DASHBOARD COMPONENT
    // ============================================================================

    function Dashboard({ masterRows, cakadoRows, balkisRows, fees }) {
      const calculateBrandStats = (rows) => {
        const companies = [...new Set(rows.map(o => o.deliveryCompany))];
        
        let totalSales = 0;
        let totalDeliveryFees = 0;
        let totalReturnFees = 0;
        
        const companyStats = companies.map(company => {
          const compOrders = rows.filter(o => o.deliveryCompany === company);
          const deliveredCount = compOrders.filter(o => o.status === 'delivered').length;
          const returnedCount = compOrders.filter(o => o.status === 'returned').length;
          const sales = compOrders.reduce((s, o) => s + o.totalSales, 0);
          
          // CRITICAL FIX: Use per-brand fee structure (fees[brand][company])
          const feeConfig = fees[company] || { delivery: 0, return: 0 };
          const dFee = deliveredCount * feeConfig.delivery;
          const rFee = returnedCount * feeConfig.return;
          
          totalSales += sales;
          totalDeliveryFees += dFee;
          totalReturnFees += rFee;
          
          return { company, deliveredCount, returnedCount, sales, dFee, rFee };
        });
        
        // CRITICAL FIX: Formula = Sales - Delivery Fees - Return Fees
        const netRevenue = totalSales - totalDeliveryFees - totalReturnFees;
        return { totalSales, totalDeliveryFees, totalReturnFees, netRevenue, companyStats, count: rows.length };
      };

      const masterStats = calculateBrandStats(masterRows);
      const cakadoStats = calculateBrandStats(cakadoRows);
      const balkisStats = calculateBrandStats(balkisRows);

      const formatTND = (val) => val.toLocaleString('ar-TN', { style: 'currency', currency: 'TND', minimumFractionDigits: 3 });

      const BrandCard = ({ title, stats }) => (
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex-1">
          <h3 className="text-xl font-bold text-gray-800 mb-4">{title} <span className="text-sm font-normal text-gray-500">({stats.count} طلب)</span></h3>
          <div className="space-y-3">
            <div className="flex justify-between text-gray-600">
              <span>إجمالي المبيعات</span>
              <span className="font-medium text-gray-900">{formatTND(stats.totalSales)}</span>
            </div>
            <div className="flex justify-between text-red-600">
              <span>إجمالي رسوم التوصيل</span>
              <span>- {formatTND(stats.totalDeliveryFees)}</span>
            </div>
            <div className="flex justify-between text-red-600">
              <span>إجمالي رسوم الإرجاع</span>
              <span>- {formatTND(stats.totalReturnFees)}</span>
            </div>
            <div className="pt-3 border-t border-gray-100 flex justify-between items-center">
              <span className="font-bold text-gray-800 text-lg">صافي الإيرادات</span>
              <span className="font-bold text-xl text-blue-600">{formatTND(stats.netRevenue)}</span>
            </div>
          </div>
          
          {stats.companyStats.length > 0 && (
            <div className="mt-4 pt-4 border-t border-gray-100">
              <h4 className="text-sm font-semibold text-gray-700 mb-2">تفاصيل الشركات</h4>
              <div className="space-y-3">
                {stats.companyStats.map(c => (
                  <div key={c.company} className="text-xs bg-gray-50 p-3 rounded border border-gray-100">
                    <div className="flex justify-between items-center mb-2 pb-2 border-b border-gray-200">
                      <span className="font-bold text-gray-800 text-sm">{c.company}</span>
                      <div className="text-left text-gray-600 flex gap-3 font-medium">
                        <span><b className="text-blue-600">{c.deliveredCount}</b> تسليم</span>
                        <span><b className="text-purple-600">{c.returnedCount}</b> إرجاع</span>
                      </div>
                    </div>
                    <div className="flex justify-between text-gray-500 mb-1">
                      <span>رسوم التوصيل:</span>
                      <span className="text-red-500 font-medium">- {formatTND(c.dFee)}</span>
                    </div>
                    <div className="flex justify-between text-gray-500">
                      <span>رسوم الإرجاع:</span>
                      <span className="text-red-500 font-medium">- {formatTND(c.rFee)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );

      return (
        <div className="flex flex-col lg:flex-row gap-4 mb-6">
          <BrandCard title="غير مصنفة" stats={masterStats} />
          <BrandCard title="كاكادو (CAKADO)" stats={cakadoStats} />
          <BrandCard title="بلقيس (Balkis)" stats={balkisStats} />
        </div>
      );
    }

    // ============================================================================
    // MAIN APP COMPONENT
    // ============================================================================

    function App() {
      // CRITICAL FIX: Separate state arrays for each zone
      const [masterRows, setMasterRows] = useState([]);
      const [cakadoRows, setCakadoRows] = useState([]);
      const [balkisRows, setBalkisRows] = useState([]);
      
      const [fees, setFees] = useState({});
      const [error, setError] = useState(null);
      const [pendingFees, setPendingFees] = useState(null);
      const [dragOverZone, setDragOverZone] = useState(null);

      const handleFileUpload = useCallback((file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

            const template = detectTemplate(rawRows);
            let result;

            if (template === 'CONVERTY') {
              result = parseConverty(rawRows);
            } else if (template === 'LOGISTA') {
              result = parseLogista(rawRows);
            } else {
              setError('خطأ: تنسيق الملف غير معروف. يُقبل ملفات Converty أو Logista فقط.');
              return;
            }

            if (result.rows.length === 0) {
              setError('خطأ: الملف لا يحتوي على أي بيانات تخص التوصيل أو الإرجاع.');
              return;
            }

            // CRITICAL FIX: Full state reset on every upload
            setError(null);
            setMasterRows(result.rows);
            setCakadoRows([]);
            setBalkisRows([]);
            
            // Auto-populate fees if detected
            if (result.autoFees) {
              setPendingFees(result.autoFees);
            }
            
            // Initialize fees for new companies
            const newCompanies = [...new Set(result.rows.map(r => r.deliveryCompany))];
            setFees(prev => {
              const newFees = { ...prev };
              newCompanies.forEach(c => {
                if (!newFees[c]) newFees[c] = { delivery: 0, return: 0 };
              });
              return newFees;
            });
            
          } catch (err) {
            setError('خطأ: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }, []);

      const onFileInputChange = useCallback((e) => {
        if (e.target.files && e.target.files.length > 0) {
          handleFileUpload(e.target.files[0]);
          e.target.value = '';
        }
      }, [handleFileUpload]);

      const allRows = useMemo(() => [...masterRows, ...cakadoRows, ...balkisRows], [masterRows, cakadoRows, balkisRows]);
      const allCompanies = useMemo(() => [...new Set(allRows.map(o => o.deliveryCompany))], [allRows]);

      // ===== DRAG-AND-DROP HANDLERS =====
      const handleDragStart = useCallback((e, row) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', row.id);
      }, []);

      const handleDragOver = useCallback((e, zoneId) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        setDragOverZone(zoneId);
      }, []);

      const handleDragLeave = useCallback(() => {
        setDragOverZone(null);
      }, []);

      const handleDrop = useCallback((e, targetZone) => {
        e.preventDefault();
        const rowId = e.dataTransfer.getData('text/plain');
        setDragOverZone(null);

        // Step 1: Find the row across all zones
        const allRowsArray = [...masterRows, ...cakadoRows, ...balkisRows];
        const sourceRow = allRowsArray.find(r => r.id === rowId);
        if (!sourceRow) return;

        // Step 2: Remove from ALL zones simultaneously
        setMasterRows(prev => prev.filter(r => r.id !== rowId));
        setCakadoRows(prev => prev.filter(r => r.id !== rowId));
        setBalkisRows(prev => prev.filter(r => r.id !== rowId));

        // Step 3: Append to target zone
        if (targetZone === 'master') {
          setMasterRows(prev => [...prev, sourceRow]);
        } else if (targetZone === 'cakado') {
          setCakadoRows(prev => [...prev, sourceRow]);
        } else if (targetZone === 'balkis') {
          setBalkisRows(prev => [...prev, sourceRow]);
        }
      }, [masterRows, cakadoRows, balkisRows]);

      const handleDragEnd = useCallback(() => {
        setDragOverZone(null);
      }, []);

      const updateFee = useCallback((company, type, value) => {
        setFees(prev => ({
          ...prev,
          [company]: {
            ...prev[company],
            [type]: parseFloat(value) || 0
          }
        }));
      }, []);

      const applyPendingFees = useCallback(() => {
        if (pendingFees) {
          const allCompaniesSet = new Set(allRows.map(r => r.deliveryCompany));
          allCompaniesSet.forEach(company => {
            setFees(prev => ({
              ...prev,
              [company]: {
                delivery: pendingFees.delivery || prev[company]?.delivery || 0,
                return: pendingFees.return || prev[company]?.return || 0
              }
            }));
          });
          setPendingFees(null);
        }
      }, [pendingFees, allRows]);

      // ===== TABLE RENDERING HELPER =====
      const BrandTable = ({ title, rows, zoneId }) => {
        // Sort by company, then render with dividers
        const sortedRows = useMemo(() => {
          return [...rows].sort((a, b) =>
            a.deliveryCompany.localeCompare(b.deliveryCompany, 'ar', { sensitivity: 'base' })
          );
        }, [rows]);

        const grouped = useMemo(() => {
          const groups = [];
          let currentCompany = null;
          let currentGroup = [];
          
          sortedRows.forEach(row => {
            if (row.deliveryCompany !== currentCompany) {
              if (currentGroup.length > 0) {
                groups.push({ company: currentCompany, rows: currentGroup });
              }
              currentCompany = row.deliveryCompany;
              currentGroup = [];
            }
            currentGroup.push(row);
          });
          
          if (currentGroup.length > 0) {
            groups.push({ company: currentCompany, rows: currentGroup });
          }
          
          return groups;
        }, [sortedRows]);

        const isActive = dragOverZone === zoneId;
        const zoneClasses = isActive
          ? 'border-2 border-blue-500 bg-blue-50 rounded-lg p-2'
          : 'border-2 border-dashed border-gray-300 min-h-[8rem] rounded';

        return (
          <div className="flex-1">
            <h3 className="text-lg font-bold text-gray-800 mb-3">{title}</h3>
            <div
              className={`${zoneClasses} transition-all`}
              onDragOver={(e) => handleDragOver(e, zoneId)}
              onDragLeave={handleDragLeave}
              onDrop={(e) => handleDrop(e, zoneId)}
            >
              {rows.length === 0 ? (
                <div className="text-center text-gray-400 py-8">لا توجد طلبات</div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="border-b border-gray-200">
                        <th className="px-3 py-2 text-right font-semibold text-gray-700">اسم المنتج</th>
                        <th className="px-3 py-2 text-right font-semibold text-gray-700">الشركة</th>
                        <th className="px-3 py-2 text-right font-semibold text-gray-700">الحالة</th>
                        <th className="px-3 py-2 text-right font-semibold text-gray-700">المبلغ</th>
                      </tr>
                    </thead>
                    <tbody>
                      {grouped.map((group, gIdx) => (
                        <React.Fragment key={gIdx}>
                          {group.rows.map((row, rIdx) => (
                            <tr
                              key={row.id}
                              draggable
                              onDragStart={(e) => handleDragStart(e, row)}
                              onDragEnd={handleDragEnd}
                              className="border-b border-gray-100 hover:bg-blue-50 cursor-move transition-colors"
                            >
                              <td className="px-3 py-2 text-gray-900 truncate" title={row.productName}>{row.productName}</td>
                              <td className="px-3 py-2 text-gray-600">{row.deliveryCompany}</td>
                              <td className="px-3 py-2">
                                <span className={`inline-flex items-center px-2 py-1 rounded-md text-xs font-semibold ${row.status === 'delivered' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                                  {row.status === 'delivered' ? 'مُسلّم' : 'مسترجع'}
                                </span>
                              </td>
                              <td className="px-3 py-2 font-bold text-gray-900">
                                {row.status === 'delivered' ? row.totalSales.toFixed(3) + ' TND' : '—'}
                              </td>
                            </tr>
                          ))}
                          {gIdx < grouped.length - 1 && (
                            <tr className="bg-gray-50">
                              <td colSpan="4" className="px-3 py-1 text-xs text-gray-500 font-semibold">
                                {grouped[gIdx + 1].company}
                              </td>
                            </tr>
                          )}
                        </React.Fragment>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            {/* Fee inputs for this brand */}
            {allCompanies.length > 0 && (
              <div className="mt-4 bg-white rounded-lg p-3 border border-gray-200">
                <h4 className="text-sm font-semibold text-gray-700 mb-3">الرسوم</h4>
                <div className="grid grid-cols-1 gap-3">
                  {allCompanies.map(company => (
                    <div key={company} className="flex items-center gap-2">
                      <label className="text-xs font-medium text-gray-600 flex-1">{company}</label>
                      <div className="flex gap-2">
                        <input
                          type="number"
                          min="0"
                          step="0.001"
                          value={fees[company]?.delivery || 0}
                          onChange={(e) => updateFee(company, 'delivery', e.target.value)}
                          placeholder="توصيل"
                          className="w-20 px-2 py-1 border border-gray-300 rounded text-xs text-center"
                        />
                        <input
                          type="number"
                          min="0"
                          step="0.001"
                          value={fees[company]?.return || 0}
                          onChange={(e) => updateFee(company, 'return', e.target.value)}
                          placeholder="إرجاع"
                          className="w-20 px-2 py-1 border border-gray-300 rounded text-xs text-center"
                        />
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="max-w-7xl mx-auto p-4 md:p-6 flex flex-col gap-6">
          {/* Page Header */}
          <div className="border-b border-gray-200 pb-4">
            <h1 className="text-3xl font-bold text-gray-900">لوحة إدارة الطلبات</h1>
          </div>

          {/* File Upload Zone */}
          <div className="bg-white rounded-lg border-2 border-dashed border-gray-300 p-6 text-center hover:border-blue-400 transition-colors">
            <input
              type="file"
              id="fileInput"
              accept=".xlsx,.csv"
              onChange={onFileInputChange}
              className="hidden"
            />
            <label htmlFor="fileInput" className="cursor-pointer">
              <p className="text-gray-600 mb-2">هنا أو اختر ملف Excel أو CSV</p>
              <p className="text-sm text-gray-500">(.xlsx و .csv)</p>
            </label>
          </div>

          {/* Auto-Fees Notice */}
          {pendingFees && (
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
              <p className="text-sm text-blue-800 mb-2">
                تم اكتشاف رسوم تسليم وإرجاع من ملف Logista. يمكنك تطبيقها على جميع الشركات:
              </p>
              <p className="text-sm text-blue-700 mb-3">
                توصيل: {pendingFees.delivery.toFixed(3)} TND | إرجاع: {pendingFees.return.toFixed(3)} TND
              </p>
              <button
                onClick={applyPendingFees}
                className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-semibold transition-colors"
              >
                تطبيق الرسوم
              </button>
            </div>
          )}

          {/* Error Message */}
          {error && (
            <div className="bg-red-50 border border-red-200 rounded-lg p-4">
              <p className="text-red-800 font-semibold mb-1">خطأ في الملف</p>
              <p className="text-sm text-red-700">{error}</p>
            </div>
          )}

          {/* Summary Dashboard */}
          <Dashboard masterRows={masterRows} cakadoRows={cakadoRows} balkisRows={balkisRows} fees={fees} />

          {/* Three-Column Table Grid */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <BrandTable title="غير مصنفة" rows={masterRows} zoneId="master" />
            <BrandTable title="كاكادو (CAKADO)" rows={cakadoRows} zoneId="cakado" />
            <BrandTable title="بلقيس (Balkis)" rows={balkisRows} zoneId="balkis" />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
